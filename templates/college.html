{% extends "base.html" %}
{% block content %}

<div class="container">

<h1 style="text-align:center;margin:30px 0;">{{ title }}</h1>

<div class="college-grid">

{% for college in colleges %}

<div class="college-card">

<div class="card-image">

{% if college.photo_url %}
<img src="{{ url_for('static', filename=college.photo_url) }}" alt="{{ college.name }}">
{% else %}
<div class="no-image">No Image</div>
{% endif %}

</div>

<div class="card-content">

<h3>{{ college.name }}</h3>

<p>📍 {{ college.location }}</p>

<span class="badge">
{{ college.counselling_system }}
</span>

<br><br>

<a href="/college/{{ college.id }}" class="btn-outline">
View Details
</a>

</div>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
