{% extends "base.html" %}
{% block content %}
<article class="news-container">
    <span class="news-tag">{{ article.category }}</span>
    <h1>{{ article.title }}</h1>
    <p><strong>Published on:</strong> {{ article.date }}</p>
    <hr>
    <div class="news-full-content">
        {{ article.summary }}
    </div>
    <br>
    <a href="/news">← Back to all Engineering News</a>
</article>
{% endblock %}
